name: CI

on:
  push:
    branches:
      - main
      - master
      - "feature/**"
  pull_request:
  workflow_dispatch:

jobs:
  build-test-package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Show Java version
        shell: pwsh
        run: java -version

      - name: Run tests
        shell: pwsh
        run: .\mvnw.cmd -q test

      - name: Build distributable jars
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\package.ps1

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: proxy-launcher-dist
          path: dist/*
